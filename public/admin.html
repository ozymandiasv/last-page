<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Last Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#f7f6f3;--bg2:#ffffff;--bg3:#f0efe9;
      --text:#1a1a1a;--text2:#555;--text3:#999;
      --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.06);
      --serif:'Lora',Georgia,serif;--sans:'Inter',system-ui,sans-serif;
    }
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}

    /* ── Screens ── */
    .screen{display:none;}
    .screen.active{display:block;}
    #loginScreen.active{display:flex;align-items:center;justify-content:center;min-height:100vh;}

    /* ── Login ── */
    .login-box{
      background:var(--bg2);border:0.5px solid var(--border2);
      border-radius:16px;padding:40px;width:100%;max-width:380px;
      box-shadow:0 4px 24px rgba(0,0,0,0.06);
    }
    .login-title{font-family:var(--serif);font-size:22px;margin-bottom:6px;}
    .login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
    .field input{
      width:100%;padding:10px 14px;border:0.5px solid var(--border);
      border-radius:8px;font-family:var(--sans);font-size:14px;
      background:var(--bg);color:var(--text);outline:none;
    }
    .btn{
      width:100%;padding:11px;border-radius:8px;border:none;
      background:var(--text);color:white;font-size:14px;font-weight:500;
      cursor:pointer;font-family:var(--sans);
    }
    .err{color:#dc2626;font-size:13px;margin-top:10px;display:none;}
    .hint{font-size:11px;color:var(--text3);margin-top:20px;padding-top:16px;border-top:0.5px solid var(--border2);line-height:1.7;}
    .hint a{color:var(--text2);}

    /* ── Nav ── */
    .admin-nav{
      background:var(--bg2);border-bottom:0.5px solid var(--border2);
      padding:0 5vw;height:52px;display:flex;align-items:center;
      justify-content:space-between;position:sticky;top:0;z-index:10;
    }
    .admin-logo{font-family:var(--serif);font-size:16px;}
    .nav-actions{display:flex;gap:10px;}
    .nav-btn{
      padding:7px 14px;border-radius:8px;border:0.5px solid var(--border);
      background:transparent;color:var(--text2);font-size:12px;
      cursor:pointer;font-family:var(--sans);text-decoration:none;display:inline-block;
    }

    /* ── Dashboard ── */
    #dashboard{max-width:780px;margin:0 auto;padding:48px 5vw 80px;}
    .dash-title{font-family:var(--serif);font-size:26px;margin-bottom:6px;}
    .dash-sub{font-size:14px;color:var(--text2);margin-bottom:36px;}
    .type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    .type-card{
      background:var(--bg2);border:0.5px solid var(--border2);
      border-radius:14px;padding:24px 20px;cursor:pointer;
      text-align:left;width:100%;font-family:var(--sans);
    }
    .type-card:hover{border-color:var(--border);}
    .type-card-icon{font-size:20px;color:var(--text3);margin-bottom:10px;}
    .type-card-name{font-family:var(--serif);font-size:17px;color:var(--text);margin-bottom:4px;}
    .type-card-desc{font-size:12px;color:var(--text3);}

    /* ── Editor ── */
    #editorScreen{max-width:1000px;margin:0 auto;padding:32px 5vw 80px;}
    .editor-top{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
    .back-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;}
    .editor-type{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
    .editor-layout{display:grid;grid-template-columns:1fr 260px;gap:24px;align-items:start;}

    .title-inp{
      width:100%;border:none;background:transparent;
      font-family:var(--serif);font-size:28px;
      color:var(--text);outline:none;padding-bottom:14px;
      border-bottom:0.5px solid var(--border2);margin-bottom:14px;
      display:block;
    }
    .title-inp::placeholder{color:var(--text3);}
    .subtitle-inp{
      width:100%;border:none;background:transparent;
      font-family:var(--serif);font-style:italic;font-size:17px;
      color:var(--text2);outline:none;margin-bottom:18px;display:block;
    }
    .subtitle-inp::placeholder{color:var(--text3);}

    .toolbar{display:flex;gap:3px;flex-wrap:wrap;padding:7px 10px;background:var(--bg3);border-radius:8px;margin-bottom:10px;}
    .tb{padding:5px 9px;border-radius:5px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:var(--sans);}
    .tb:hover{background:var(--bg2);color:var(--text);}
    .tb-sep{width:0.5px;background:var(--border);margin:0 3px;}

    .body-inp{
      width:100%;min-height:420px;border:0.5px solid var(--border2);
      border-radius:10px;padding:20px;font-family:var(--sans);
      font-size:16px;line-height:1.8;color:var(--text);
      background:var(--bg2);outline:none;resize:vertical;display:block;
    }

    .sidebar-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:12px;padding:18px;margin-bottom:12px;}
    .sc-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
    .sf{margin-bottom:12px;}
    .sf label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;}
    .sf input,.sf select,.sf textarea{
      width:100%;padding:8px 10px;border:0.5px solid var(--border);
      border-radius:6px;font-family:var(--sans);font-size:13px;
      background:var(--bg);color:var(--text);outline:none;
    }
    .sf textarea{min-height:64px;resize:vertical;}

    .pub-btn{
      width:100%;padding:12px;border-radius:10px;border:none;
      background:var(--text);color:white;font-size:14px;font-weight:500;
      cursor:pointer;font-family:var(--sans);
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .pub-btn:disabled{opacity:.45;cursor:not-allowed;}

    .status{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;display:none;line-height:1.5;}
    .status.ok{background:#dcfce7;color:#166534;display:block;}
    .status.err{background:#fee2e2;color:#991b1b;display:block;}
    .status.loading{background:var(--bg3);color:var(--text2);display:block;}

    @media(max-width:680px){
      .editor-layout{grid-template-columns:1fr;}
      .type-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-title">O IV · Last Page</div>
    <div class="login-sub">Admin — sign in to write</div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="Enter password" />
    </div>
    <div class="field">
      <label>GitHub Token</label>
      <input type="password" id="tokenInput" placeholder="ghp_... or github_pat_..." />
    </div>
    <button class="btn" id="loginBtn">Sign In</button>
    <div class="err" id="loginErr">Wrong password.</div>
    <div class="hint">
      Token needs <strong>repo</strong> scope.<br>
      <a href="https://github.com/settings/tokens" target="_blank">Generate one here →</a>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <nav class="admin-nav">
    <div class="admin-logo">Last Page · Admin</div>
    <div class="nav-actions">
      <a href="/" class="nav-btn">View site →</a>
      <button class="nav-btn" id="logoutBtn">Sign out</button>
    </div>
  </nav>

  <!-- Dashboard -->
  <div id="dashboard" class="screen active">
    <h1 class="dash-title">What are you writing?</h1>
    <p class="dash-sub">Choose a format to start.</p>
    <div class="type-grid">
      <button class="type-card" data-type="Blog">
        <div class="type-card-icon"><i class="ti ti-pencil"></i></div>
        <div class="type-card-name">Blog</div>
        <div class="type-card-desc">Events, observations, stories</div>
      </button>
      <button class="type-card" data-type="Essay">
        <div class="type-card-icon"><i class="ti ti-brain"></i></div>
        <div class="type-card-name">Essay</div>
        <div class="type-card-desc">Deep thoughts, long form</div>
      </button>
      <button class="type-card" data-type="Verse">
        <div class="type-card-icon"><i class="ti ti-feather"></i></div>
        <div class="type-card-name">Verse</div>
        <div class="type-card-desc">Poetry, fragments</div>
      </button>
      <button class="type-card" data-type="Notes">
        <div class="type-card-icon"><i class="ti ti-message-circle"></i></div>
        <div class="type-card-name">Note</div>
        <div class="type-card-desc">Tweet-length thoughts</div>
      </button>
    </div>
  </div>

  <!-- Editor -->
  <div id="editorScreen" class="screen">
    <div class="editor-top">
      <button class="back-btn" id="backBtn">←</button>
      <span class="editor-type" id="editorTypeLabel">Blog</span>
    </div>
    <div class="editor-layout">
      <div>
        <input class="title-inp" id="postTitle" placeholder="Title" />
        <input class="subtitle-inp" id="postSubtitle" placeholder="Subtitle (optional)" />
        <div class="toolbar" id="toolbar">
          <button class="tb" data-action="bold"><b>B</b></button>
          <button class="tb" data-action="italic"><i>I</i></button>
          <div class="tb-sep"></div>
          <button class="tb" data-action="h2">H2</button>
          <button class="tb" data-action="h3">H3</button>
          <div class="tb-sep"></div>
          <button class="tb" data-action="quote">❝</button>
          <button class="tb" data-action="list">☰</button>
          <button class="tb" data-action="hr">—</button>
          <div class="tb-sep"></div>
          <button class="tb" data-action="link">🔗</button>
        </div>
        <textarea class="body-inp" id="postBody" placeholder="Start writing…"></textarea>
      </div>
      <div>
        <div class="sidebar-card">
          <div class="sc-title">Details</div>
          <div class="sf"><label>Date</label><input type="date" id="postDate" /></div>
          <div class="sf" id="catWrap"><label>Category</label>
            <select id="postCategory">
              <option>State and Power</option>
              <option>Culture and History</option>
              <option>Literature and Media</option>
              <option>Sports and Events</option>
              <option>Science and Technology</option>
              <option>Society and Future</option>
              <option>Ideologies and Philosophies</option>
              <option selected>Life</option>
            </select>
          </div>
          <div class="sf" id="prevWrap" style="display:none"><label>Preview (first 2 lines)</label><textarea id="postPreview" placeholder="First two lines…"></textarea></div>
          <div class="sf"><label>Tags (comma separated)</label><input type="text" id="postTags" placeholder="memory, travel" /></div>
          <div class="sf" id="coverWrap"><label>Cover Image URL</label><input type="text" id="postCover" placeholder="https://…" /></div>
        </div>
        <button class="pub-btn" id="pubBtn">⬆ Publish</button>
        <div class="status" id="statusMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
const PASS = 'lastpage2025';
const REPO = 'ozymandiasv/last-page';
const BRANCH = 'main';
let token = '';
let postType = 'Blog';

// ── Helpers ──
function $(id){ return document.getElementById(id); }
function showScreen(id){
  // hide all top-level screens
  ['loginScreen','adminScreen'].forEach(s=>{
    const el=$(s);
    el.classList.remove('active');
  });
  $(id).classList.add('active');
}
function showPanel(id){
  ['dashboard','editorScreen'].forEach(s=>{
    const el=$(s);
    el.classList.remove('active');
  });
  $(id).classList.add('active');
}
function today(){ return new Date().toISOString().split('T')[0]; }
function slugify(s){ return s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').slice(0,60); }

// ── Auth ──
$('loginBtn').addEventListener('click', doLogin);
$('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
$('tokenInput').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

function doLogin(){
  const pw = $('pwInput').value;
  const tk = $('tokenInput').value.trim();
  if(pw !== PASS){ $('loginErr').style.display='block'; return; }
  if(!tk){ alert('Please enter your GitHub token.'); return; }
  token = tk;
  sessionStorage.setItem('lp_tk', tk);
  $('postDate').value = today();
  showScreen('adminScreen');
}

$('logoutBtn').addEventListener('click', ()=>{
  sessionStorage.removeItem('lp_tk');
  showScreen('loginScreen');
});

// Auto-login
const saved = sessionStorage.getItem('lp_tk');
if(saved){ token=saved; $('postDate').value=today(); showScreen('adminScreen'); }

// ── Dashboard ──
document.querySelectorAll('.type-card').forEach(card=>{
  card.addEventListener('click', ()=>{
    postType = card.dataset.type;
    openEditor(postType);
  });
});

function openEditor(type){
  $('editorTypeLabel').textContent = type;
  const isLong = type==='Blog'||type==='Essay';
  const isVerse = type==='Verse';
  $('coverWrap').style.display = isLong ? '' : 'none';
  $('catWrap').style.display   = isLong ? '' : 'none';
  $('prevWrap').style.display  = isVerse ? '' : 'none';
  $('postSubtitle').style.display = isLong ? 'block' : 'none';
  $('toolbar').style.display   = type==='Notes' ? 'none' : 'flex';
  $('postBody').placeholder    = type==='Notes' ? 'Your note…' : type==='Verse' ? 'Write your verse…' : 'Start writing…';
  $('postTitle').placeholder   = type==='Notes' ? 'Internal title (not shown)' : 'Title';
  showPanel('editorScreen');
  $('postTitle').focus();
}

$('backBtn').addEventListener('click', ()=>{
  showPanel('dashboard');
  ['postTitle','postSubtitle','postBody','postTags','postCover','postPreview'].forEach(id=>{ $(id).value=''; });
  const s=$('statusMsg'); s.className='status'; s.textContent='';
  $('postDate').value=today();
});

// ── Toolbar ──
document.querySelectorAll('.tb[data-action]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const ta=$('postBody');
    const a=btn.dataset.action;
    const s=ta.selectionStart, e=ta.selectionEnd, sel=ta.value.slice(s,e);
    if(a==='bold')  insert(ta,s,e,'**'+sel+'**', s+2, e+2);
    else if(a==='italic') insert(ta,s,e,'*'+sel+'*', s+1, e+1);
    else if(a==='h2')   linePrefix(ta,'## ');
    else if(a==='h3')   linePrefix(ta,'### ');
    else if(a==='quote') linePrefix(ta,'> ');
    else if(a==='list')  linePrefix(ta,'- ');
    else if(a==='hr'){   const ins='\n---\n'; ta.value=ta.value.slice(0,s)+ins+ta.value.slice(e); }
    else if(a==='link'){
      const url=prompt('URL:'); if(!url) return;
      const lbl=prompt('Label:')||url;
      const ins=`[${lbl}](${url})`;
      ta.value=ta.value.slice(0,s)+ins+ta.value.slice(e);
    }
    ta.focus();
  });
});

function insert(ta,s,e,text,ns,ne){ ta.value=ta.value.slice(0,s)+text+ta.value.slice(e); ta.selectionStart=ns; ta.selectionEnd=ne; }
function linePrefix(ta,pfx){ const s=ta.selectionStart, nl=ta.value.lastIndexOf('\n',s-1), pos=nl+1; ta.value=ta.value.slice(0,pos)+pfx+ta.value.slice(pos); ta.selectionStart=ta.selectionEnd=pos+pfx.length; }

// ── Publish ──
$('pubBtn').addEventListener('click', async ()=>{
  const title=$('postTitle').value.trim();
  const body=$('postBody').value.trim();
  if(!title){ alert('Add a title.'); return; }
  if(!body){ alert('Write something.'); return; }

  const slug=slugify(title);
  const dir={Blog:'blogs',Essay:'essays',Verse:'verses',Notes:'notes'}[postType];
  const path=`src/content/${dir}/${slug}.md`;

  let fm=`---\ntitle: "${title}"\ntype: "${postType}"\ndate: "${$('postDate').value}"\npublished: true\n`;
  const sub=$('postSubtitle').value.trim();
  const cat=$('postCategory').value;
  const cover=$('postCover').value.trim();
  const prev=$('postPreview').value.trim();
  const tags=$('postTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(sub && (postType==='Blog'||postType==='Essay')) fm+=`subtitle: "${sub}"\n`;
  if(cat && (postType==='Blog'||postType==='Essay')) fm+=`category: "${cat}"\n`;
  if(cover) fm+=`cover: "${cover}"\n`;
  if(prev) fm+=`preview: "${prev}"\n`;
  if(tags.length) fm+=`tags:\n${tags.map(t=>`  - ${t}`).join('\n')}\n`;
  fm+=`---\n\n`;

  const content=fm+body;
  const encoded=btoa(unescape(encodeURIComponent(content)));

  const btn=$('pubBtn'); const msg=$('statusMsg');
  btn.disabled=true; msg.className='status loading'; msg.textContent='Publishing…';

  try{
    let sha=null;
    const chk=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,
      {headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
    if(chk.ok) sha=(await chk.json()).sha;

    const payload={message:`post: ${title}`,content:encoded,branch:BRANCH};
    if(sha) payload.sha=sha;

    const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{
      method:'PUT',
      headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });

    if(res.ok){
      msg.className='status ok';
      msg.textContent=`✓ Published! "${title}" — site rebuilding in ~30s.`;
    } else {
      const er=await res.json(); throw new Error(er.message);
    }
  } catch(er){
    msg.className='status err'; msg.textContent=`Error: ${er.message}`;
  }
  btn.disabled=false;
});
</script>
</body>
</html>
